services:
  # Backend Web Service
  - type: web
    name: relatel-backend
    runtime: python
    rootDir: backend
    buildCommand: bash ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT relatel_prj.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.15"
      - key: DATABASE_URL
        sync: false # Vous collerez l'URL de Neon.tech ici dans l'interface Render
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "relatel-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://relatel-frontend.onrender.com,https://relatel-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://relatel-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://relatel-frontend.onrender.com"
      - key: BACKEND_BASE_URL
        value: "https://relatel-backend.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  # Frontend Static Site
  - type: web
    name: relatel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://relatel-backend.onrender.com/api"
