services:
  # Backend Web Service
  - type: web
    name: relatel-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT relatel_prj.asgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relatel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "relatel-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://relatel-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://relatel-frontend.onrender.com"

  # Frontend Static Site
  - type: web
    name: relatel-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://relatel-backend.onrender.com/api"

databases:
  - name: relatel-db
    databaseName: relatel
    user: relatel_user
    plan: free
